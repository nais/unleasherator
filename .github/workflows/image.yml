name: Container Image

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  GAR_REGISTRY: europe-north1-docker.pkg.dev/nais-io/nais/images

  ARTIFACT_REGISTRY: europe-north1-docker.pkg.dev
  ARTIFACT_REPO: nais-io/nais/images
  SERVICE_ACCOUNT: gh-bifrost@nais-io.iam.gserviceaccount.com

jobs:
  meta:
    name: Metadata
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      "version": ${{ steps.version.outputs.version }}
      "name": ${{ steps.name.outputs.name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        run: echo "version=$(date +'%Y%m%d')-$(git rev-parse --short HEAD)" >> ${GITHUB_OUTPUT}

      - id: name
        run: echo "name=${{ github.event.repository.name }}" >> ${GITHUB_OUTPUT}

  lint:
    name: Lint code
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
      - name: Set up Go environment
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # ratchet:golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build and Test code
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
      - name: Restore cached binaries
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache/restore@v5.0.5
        with:
          path: ${{ github.workspace }}/bin
          key: ${{ runner.os }}-bin-${{ hashFiles('Makefile', 'go.mod') }}
      - name: Set up Go environment
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version: "1.26"
      - name: Generate code
        run: |
          make generate proto
          if git diff --quiet HEAD --; then
            echo "Code generated successfully."
          else
            echo "Code has generation issues."
            echo $(git diff HEAD --)
            echo "Please run 'make generate proto' and commit the changes."
            exit 1
          fi
      - name: Generate manifests
        run: |
          make manifests
          if git diff --quiet HEAD --; then
            echo "Manifests generated successfully."
          else
            echo "Manifests have generation issues."
            echo "Please run 'make manifests' and commit the changes."
            exit 1
          fi
      - name: Generate helm chart
        run: |
          make helm
          if git diff --quiet HEAD --; then
            echo "Helm chart generated successfully."
          else
            echo "Helm chart has generation issues."
            echo "Please run 'make helm' and commit the changes."
            exit 1
          fi
      - name: Vet code
        run: make vet
      - name: Test code
        run: make test
      - name: Validate API types against Unleash schemas
        run: make test-schemas
      - name: Build binary
        run: make build
      - name: Cache installed binaries
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # ratchet:actions/cache@v5.0.5
        with:
          path: ${{ github.workspace }}/bin
          key: ${{ runner.os }}-bin-${{ hashFiles('Makefile', 'go.mod') }}
  docker:
    name: Build Docker image (${{ matrix.arch }})
    permissions:
      contents: read
      packages: write
    runs-on: ${{ matrix.runner }}
    needs: [meta, lint, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4.1.0
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # ratchet:docker/metadata-action@v6.1.0
        id: metadata
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository }}
          tags: |
            type=schedule,suffix=-${{ matrix.arch }}
            type=ref,event=branch,suffix=-${{ matrix.arch }}
            type=ref,event=pr,suffix=-${{ matrix.arch }}
            type=semver,pattern=v{{version}},suffix=-${{ matrix.arch }}
            type=semver,pattern=v{{major}}.{{minor}},suffix=-${{ matrix.arch }}
            type=semver,pattern=v{{major}},suffix=-${{ matrix.arch }}
            type=sha,suffix=-${{ matrix.arch }}
            type=raw,value=${{ needs.meta.outputs.version }}-${{ matrix.arch }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7.2.0
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}

  manifest:
    name: Create and Push Multi-arch Manifest
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs: [meta, docker]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4.1.0
      - name: Create and push manifest
        run: |
          IMAGE="${{ env.GHCR_REGISTRY }}/${{ github.repository }}"
          VERSION="${{ needs.meta.outputs.version }}"

          # Create manifest for version tag
          docker buildx imagetools create -t ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-amd64 \
            ${IMAGE}:${VERSION}-arm64

          # Create manifest for main branch tag
          docker buildx imagetools create -t ${IMAGE}:main \
            ${IMAGE}:main-amd64 \
            ${IMAGE}:main-arm64

          # Create manifest for sha tag
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker buildx imagetools create -t ${IMAGE}:sha-${SHA} \
            ${IMAGE}:sha-${SHA}-amd64 \
            ${IMAGE}:sha-${SHA}-arm64
